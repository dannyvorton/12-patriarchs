<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Twelve Patriarchs</title>
    <link rel="stylesheet" href="style.css" title="Styles">
</head>
<body>
    
    <div class="grid-container">
        <div class="jacob father">Jacob (Israel)</div>
        <div class="leah mother">Leah<br>1st wife</div>
        <div class="rachel mother">Rachel<br>2nd wife</div>
        <div class="bilhah mother">Bilhah<br>3rd wife</div>
        <div class="zilpah mother">Zilpah<br>4th wife</div>
        <div class="reuben child">Reuben<br>1st son</div>
        <div class="joseph child">Joseph<br>11th son</div>
        <div class="dan child">Dan<br>5th son</div>
        <div class="gad child">Gad<br>7th son</div>
        <div class="simeon child">Simeon<br>2nd son</div>
        <div class="benjamin child">Benjamin<br>12 son</div>
        <div class="naphtali child">Naphtali<br>6th son</div>
        <div class="asher child">Asher<br>8th son</div>
        <div class="levi child">Levi<br>3rd son</div>
        <div class="judah child">Judah<br>4th son</div>
        <div class="issachar child">Issachar<br>9th son</div>
        <div class="zebulun child">Zebulun<br>10th son</div>
        <div class="dinah child">Dina<br>1st daughter</div>
    </div>

</body>
</html>
